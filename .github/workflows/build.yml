name: Build

on:
  pull_request:
    branches: [develop, main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install tray + GTK dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
      - name: Build workspace targets
        run: cargo build -p gwt-core -p gwt --all-features

  check-windows:
    name: Check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: check-windows
        continue-on-error: true
      - name: Check Windows compilation
        run: cargo check -p gwt-core -p gwt

  check-macos:
    name: Check (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: Reset broken pre-installed Rust on macOS runners
        shell: bash
        run: |
          set -e
          rm -rf "$HOME/.cargo" "$HOME/.rustup" || true
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain none --no-modify-path
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: check-macos
        continue-on-error: true
      - name: Check macOS compilation
        run: cargo check -p gwt-core -p gwt
