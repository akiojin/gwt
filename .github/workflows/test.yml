name: Test

on:
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: Test (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install tray + GTK dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
      - name: Run tests
        run: cargo test --workspace --all-features
        timeout-minutes: 15
      - name: Voice accuracy regression (optional local dataset)
        run: |
          if [ -f tests/voice_eval/manifest.json ]; then
            scripts/voice-eval.sh --max-wer-delta 0.03 --max-cer-delta 0.03
          else
            echo "Skipping voice accuracy regression: tests/voice_eval/manifest.json not found."
          fi
        timeout-minutes: 10

  test-python-runner:
    name: Test (Python runner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r crates/gwt-core/runtime/project_index_requirements.txt
          pip install pytest
      - name: Run Phase 8 runner tests
        env:
          GWT_INDEX_FAKE_EMBEDDING: "1"
        run: pytest -q crates/gwt-core/runtime/tests crates/gwt-core/runtime/test_chroma_index_runner.py
        timeout-minutes: 10

  test-index-e2e:
    name: Test (e5 e2e, optional)
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.draft == false }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache HuggingFace model (e5-base)
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-cache-multilingual-e5-base-v1
      - name: Bootstrap gwt runtime assets
        run: |
          mkdir -p ~/.gwt/runtime
          cp crates/gwt-core/runtime/chroma_index_runner.py ~/.gwt/runtime/
          python -m venv ~/.gwt/runtime/chroma-venv
          ~/.gwt/runtime/chroma-venv/bin/pip install --upgrade pip
          ~/.gwt/runtime/chroma-venv/bin/pip install -r crates/gwt-core/runtime/project_index_requirements.txt
      - name: Run ignored e2e tests with real e5 model
        run: cargo test -p gwt-core --tests -- --ignored
        timeout-minutes: 30
        continue-on-error: true

  test-windows-rust:
    name: Test (Rust, Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
      - name: Run Windows PTY regression tests
        run: cargo test -p gwt-core terminal::pty
        timeout-minutes: 15
      - name: Run release asset contract tests
        run: node scripts/test_release_assets.cjs
        timeout-minutes: 15

  test-frontend:
    name: Test (Frontend + WebView E2E)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - name: Run frontend unit tests
        run: bash scripts/run-frontend-unit-tests.sh
        timeout-minutes: 10
      - name: Run frontend smoke tests
        run: bash scripts/run-frontend-smoke-tests.sh
        timeout-minutes: 10
      # Browsers must match run-visual-tests.sh's pinned Playwright version
      # (GWT_PLAYWRIGHT_VERSION default). The shared ~/.cache/ms-playwright is
      # reused by the script's temp-dir Playwright install of the same version.
      - name: Install Playwright chromium + system deps
        run: npx --yes playwright@1.49.1 install --with-deps chromium
        timeout-minutes: 10
      # Embedded-frontend specs stub WebSocket + serve crates/gwt/web via
      # page.route, so they run without a live gwt. live-gwt specs self-skip
      # when GWT_PLAYWRIGHT_BASE_URL is unset.
      - name: Run WebView E2E (embedded Playwright specs)
        run: bash scripts/run-visual-tests.sh
        timeout-minutes: 15
