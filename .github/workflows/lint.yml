name: Lint

on:
  pull_request:
    branches: [develop, main]

jobs:
  audit:
    name: Cargo Deny (advisories + sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.4
      - name: Run cargo deny (advisories + sources)
        run: cargo deny check advisories sources
  lint:
    name: Clippy & Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install WebView dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Run Clippy
        run: cargo clippy -p gwt-core -p gwt --all-targets --all-features -- -D warnings
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check rustdoc warnings
        # The codebase is at 0 rustdoc warnings post-PR #2331; this
        # gate keeps it that way by failing CI if a future PR
        # reintroduces a broken intra-doc link, an unclosed HTML tag,
        # or a public-doc link to a private item.
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps --document-private-items
      - name: Check frontend bundle syntax
        run: bash scripts/check-frontend-bundle.sh
      - name: Check release flow contract
        run: bash scripts/check-release-flow.sh
      - name: Run Markdownlint
        uses: nosborn/github-action-markdown-cli@v3.5.0
        with:
          files: .
          config_file: .markdownlint.json
          ignore_files: |
            target/
            CHANGELOG.md
      - name: Validate SKILL.md frontmatter
        run: bash scripts/validate-skill-frontmatter.sh

  commitlint:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - name: Validate commit messages
        continue-on-error: true
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          MERGE_BASE=$(git merge-base "$HEAD_SHA" "$BASE_SHA" || true)
          LAST_BASE_MERGE=$(
            git rev-list --merges --first-parent "$HEAD_SHA" | while read -r merge; do
              p2=$(git rev-parse "$merge^2" 2>/dev/null) || continue
              if git merge-base --is-ancestor "$p2" "$BASE_SHA"; then
                echo "$merge"
                break
              fi
            done
          )
          FROM_SHA=${LAST_BASE_MERGE:-${MERGE_BASE:-$BASE_SHA}}
          COMMIT_COUNT=$(git rev-list --count "$FROM_SHA".."$HEAD_SHA")
          if [ "$COMMIT_COUNT" -gt 100 ]; then
            bunx --package @commitlint/cli@20.4.1 commitlint --config commitlint.config.cjs --from "HEAD~50" --to "HEAD" --verbose
          else
            bunx --package @commitlint/cli@20.4.1 commitlint --config commitlint.config.cjs --from "$FROM_SHA" --to "$HEAD_SHA" --verbose
          fi
