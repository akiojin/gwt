name: Coverage Report

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  rust-coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: develop
      - name: Install WebView dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate filtered summary
        run: cargo llvm-cov -p gwt-core -p gwt --all-features --json --summary-only --output-path target/coverage-summary.json
        timeout-minutes: 15
      - name: Enforce coverage threshold
        run: node scripts/check-coverage-threshold.mjs target/coverage-summary.json 90
      - name: Generate lcov
        run: cargo llvm-cov report -p gwt-core -p gwt --lcov --output-path lcov.info
        timeout-minutes: 15
      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          flags: rust
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
