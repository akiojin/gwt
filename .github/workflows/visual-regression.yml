name: Visual Regression

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'crates/gwt/web/**'
      - 'crates/gwt/src/embedded_web.rs'
      - 'crates/gwt/src/embedded_server.rs'
      - 'crates/gwt/playwright/**'
      - 'package.json'

jobs:
  visual-regression:
    name: Operator Design System (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Install WebView dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build gwt
        run: cargo build -p gwt --release

      - name: Frontend unit tests
        run: npm run test:frontend-unit

      - name: Frontend smoke tests
        run: npm run test:frontend-smoke

      - name: Visual regression
        run: npm run test:visual

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diff
          path: |
            crates/gwt/playwright/test-results/
            crates/gwt/playwright/snapshots/
          retention-days: 14
