name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-tag:
    name: Create Tag and Release
    runs-on: ubuntu-latest
    # Only run on release branch merges or manual trigger
    # Supports: squash merge, merge commit, and workflow_dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.head_commit.message, 'chore(release):') ||
      contains(github.event.head_commit.message, 'from akiojin/release/') ||
      contains(github.event.head_commit.message, 'from akiojin/develop')
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Get version from Cargo.toml
        id: tag
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          TAG_NAME="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, Tag: $TAG_NAME"

      - name: Fetch tags
        run: git fetch --tags

      - name: Check if tag exists
        id: check-tag
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG_NAME already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG_NAME does not exist"
          fi

      - name: Create and push tag
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Create GitHub Release
        if: steps.check-tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        run: |
          # Extract changelog for this version
          if [ -f CHANGELOG.md ]; then
            NOTES=$(sed -n "/## \[${TAG_NAME#v}\]/,/## \[/p" CHANGELOG.md | head -n -1)
          else
            NOTES="Release $TAG_NAME"
          fi

          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes "$NOTES" \
            --draft=false

  build-tauri:
    name: Build Tauri (${{ matrix.platform }})
    needs: create-tag
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_VERSION: ${{ needs.create-tag.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: tauri-${{ matrix.platform }}
      # actions/setup-node's pnpm cache requires pnpm to be available.
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: gwt-gui/pnpm-lock.yaml
      - name: Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@10.29.2 --activate
          pnpm --version
      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install frontend dependencies
        run: cd gwt-gui && pnpm install --frozen-lockfile
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"
      - name: Build Tauri
        run: cargo tauri build -- --bin gwt-tauri
        env:
          # Disable CPU-native optimizations for whisper.cpp/ggml to avoid
          # ARM i8mm intrinsic errors on macOS CI runners (Xcode 16.4 Apple Clang
          # defines __ARM_FEATURE_MATMUL_INT8 with -mcpu=native+noi8mm).
          # whisper-rs-sys passes CMAKE_* env vars as cmake defines, so we use
          # CMAKE_TOOLCHAIN_FILE to inject GGML_NATIVE=OFF before ggml's option().
          CMAKE_TOOLCHAIN_FILE: ${{ matrix.platform == 'macos' && format('{0}/cmake/ci-disable-native.cmake', github.workspace) || '' }}
          # ARM Macs require macOS 11.0+; ggml uses std::filesystem (10.15+).
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.platform == 'macos' && '11.0' || '' }}
          # Also pass as cmake define (whisper-rs-sys forwards CMAKE_* env vars).
          # cmake appends -mmacosx-version-min AFTER CMAKE_C_FLAGS, so the last
          # flag (from this define) wins over the 10.13 injected by cmake-rs/cc.
          CMAKE_OSX_DEPLOYMENT_TARGET: ${{ matrix.platform == 'macos' && '11.0' || '' }}
      - name: Ensure macOS signing secrets
        if: matrix.platform == 'macos'
        shell: bash
        env:
          APPLE_CERT_APP_BASE64: ${{ secrets.APPLE_CERT_APP_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          required=(
            APPLE_CERT_APP_BASE64
            APPLE_CERTIFICATE_PASSWORD
            APPLE_ID
            APPLE_ID_PASSWORD
            APPLE_TEAM_ID
          )
          missing=()
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::missing macOS signing/notarization secrets: ${missing[*]}"
            exit 1
          fi
      - name: Setup macOS signing keychain
        if: matrix.platform == 'macos'
        shell: bash
        env:
          APPLE_CERT_APP_BASE64: ${{ secrets.APPLE_CERT_APP_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/gwt-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="${RUNNER_TEMP}/gwt-signing.p12"
          export CERT_PATH

          python3 - <<'PY'
import base64, os, pathlib
cert_b64 = os.environ["APPLE_CERT_APP_BASE64"]
path = pathlib.Path(os.environ["CERT_PATH"])
path.write_bytes(base64.b64decode(cert_b64))
PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          echo "CERT_PATH=$CERT_PATH" >> "$GITHUB_ENV"
      - name: Codesign macOS app bundle
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          APP_PATH="target/release/bundle/macos/gwt.app"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "::error::gwt.app not found at $APP_PATH"
            exit 1
          fi
          IDENTITY="$(security find-identity -p codesigning -v "$KEYCHAIN_PATH" | awk 'NR==1 {print $2}')"
          if [[ -z "$IDENTITY" ]]; then
            echo "::error::no codesigning identity found in keychain"
            exit 1
          fi
          codesign --force --options runtime --sign "$IDENTITY" --deep "$APP_PATH"
          codesign --verify --deep --strict --verbose=4 "$APP_PATH"
      - name: Notarize and staple DMG
        if: matrix.platform == 'macos'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH="$(ls -1 target/release/bundle/dmg/*.dmg | head -n 1)"
          if [[ -z "$DMG_PATH" ]]; then
            echo "::error::DMG not found under target/release/bundle/dmg"
            exit 1
          fi
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          spctl --assess --verbose=4 "$DMG_PATH"
          spctl --assess --verbose=4 "target/release/bundle/macos/gwt.app"
      - name: Build Windows installer (.msi)
        if: matrix.platform == 'windows'
        id: package_windows
        shell: pwsh
        run: |
          $version = "${env:RELEASE_VERSION}"
          if ([string]::IsNullOrEmpty($version)) {
            Write-Error "Release version is not available."
            exit 1
          }
          powershell -ExecutionPolicy Bypass -File installers/windows/build-msi.ps1 -Version $version -SkipBuild
          $msiPath = Join-Path $PWD "target\\release\\bundle\\windows\\gwt-windows-x86_64.msi"
          "msi_path=$msiPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Validate Windows installer (.msi)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $msiPath = "${{ steps.package_windows.outputs.msi_path }}"
          if ([string]::IsNullOrEmpty($msiPath)) {
            Write-Error "Windows MSI path is missing."
            exit 1
          }
          if (-not (Test-Path $msiPath)) {
            Write-Error "Windows MSI not found: $msiPath"
            exit 1
          }
          if (-not ($msiPath.ToLower().EndsWith(".msi"))) {
            Write-Error "Windows MSI has unexpected name."
            exit 1
          }
      - name: Upload artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v6
        with:
          name: gwt-linux
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v6
        with:
          name: gwt-macos
          path: target/release/bundle/dmg/*.dmg
      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v6
        with:
          name: gwt-windows
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/windows/*.msi

  upload-release:
    name: Upload to GitHub Release
    needs: [create-tag, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
      - name: Display artifacts
        run: find artifacts -type f | head -20
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-tag.outputs.tag_name }}
          files: artifacts/**/*
