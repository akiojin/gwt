name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-tag:
    name: Create Tag and Release
    runs-on: ubuntu-latest
    # Only run on release branch merges or manual trigger
    # Supports: merge commit and workflow_dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.head_commit.message, 'chore(release):') ||
      contains(github.event.head_commit.message, 'from akiojin/release/') ||
      contains(github.event.head_commit.message, 'from akiojin/develop')
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Get version from Cargo.toml
        id: tag
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          TAG_NAME="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, Tag: $TAG_NAME"

      - name: Fetch tags
        run: git fetch --tags

      - name: Check if tag exists
        id: check-tag
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG_NAME already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG_NAME does not exist"
          fi

      - name: Create and push tag
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Create GitHub Release
        if: steps.check-tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        run: |
          # Extract changelog for this version
          if [ -f CHANGELOG.md ]; then
            NOTES=$(sed -n "/## \[${TAG_NAME#v}\]/,/## \[/p" CHANGELOG.md | head -n -1)
          else
            NOTES="Release $TAG_NAME"
          fi

          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes "$NOTES" \
            --draft

  build-gwt:
    name: Build gwt (${{ matrix.platform }})
    needs: create-tag
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_VERSION: ${{ needs.create-tag.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: gwt
            release_name: gwt-linux-x86_64
            archive_name: gwt-linux-x86_64.tar.gz
          - platform: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: gwt
            release_name: gwt-linux-aarch64
            archive_name: gwt-linux-aarch64.tar.gz
          - platform: macos-x86_64
            os: macos-14
            target: x86_64-apple-darwin
            binary: gwt
            release_name: gwt-macos-x86_64
            archive_name: gwt-macos-x86_64.tar.gz
          - platform: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            binary: gwt
            release_name: gwt-macos-arm64
            archive_name: gwt-macos-arm64.tar.gz
          - platform: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: gwt.exe
            release_name: gwt-windows-x86_64
            archive_name: gwt-windows-x86_64.zip
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: gwt-${{ matrix.platform }}
      - name: Install WebView dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev
      - name: Build gwt binary
        run: cargo build --release -p gwt --target ${{ matrix.target }}
      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.binary }}"
          Compress-Archive -Path "dist/${{ matrix.binary }}" -DestinationPath "dist/${{ matrix.archive_name }}" -Force
          Remove-Item "dist/${{ matrix.binary }}"
      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cd dist
          cp ../target/${{ matrix.target }}/release/${{ matrix.binary }} .
          tar -czf ${{ matrix.archive_name }} ${{ matrix.binary }}
          rm ${{ matrix.binary }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive_name }}
          path: dist/${{ matrix.archive_name }}

  build-msi:
    name: Build MSI installer (Windows)
    needs: create-tag
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ needs.create-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: gwt-msi
      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix --version 6.0.2
      - name: Build gwt binary
        run: cargo build --release -p gwt --target x86_64-pc-windows-msvc
      - name: Build MSI
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          wix build -arch x64 -out dist/gwt-windows-x86_64.msi -src wix/main.wxs -d Version=$env:RELEASE_VERSION -bindpath gwt=target/x86_64-pc-windows-msvc/release
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: gwt-windows-x86_64.msi
          path: dist/gwt-windows-x86_64.msi

  build-dmg:
    name: Build DMG installer (macOS)
    needs: create-tag
    runs-on: macos-latest
    env:
      RELEASE_VERSION: ${{ needs.create-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: gwt-dmg
      - name: Build gwt for aarch64
        run: cargo build --release -p gwt --target aarch64-apple-darwin
      - name: Build gwt for x86_64
        run: cargo build --release -p gwt --target x86_64-apple-darwin
      - name: Create universal binary
        run: |
          mkdir -p dist
          lipo -create \
            target/aarch64-apple-darwin/release/gwt \
            target/x86_64-apple-darwin/release/gwt \
            -output dist/gwt
      - name: Create app bundle
        run: |
          mkdir -p dist/GWT.app/Contents/MacOS
          cat > dist/GWT.app/Contents/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDisplayName</key>
            <string>GWT</string>
            <key>CFBundleExecutable</key>
            <string>gwt</string>
            <key>CFBundleIdentifier</key>
            <string>io.github.akiojin.gwt</string>
            <key>CFBundleName</key>
            <string>GWT</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${RELEASE_VERSION}</string>
            <key>CFBundleVersion</key>
            <string>${RELEASE_VERSION}</string>
          </dict>
          </plist>
          EOF
          cp dist/gwt dist/GWT.app/Contents/MacOS/gwt
          chmod +x dist/GWT.app/Contents/MacOS/gwt
      - name: Create DMG
        run: |
          mkdir -p dmg_temp
          cp -R dist/GWT.app dmg_temp/GWT.app
          ln -s /Applications dmg_temp/Applications
          hdiutil create -volname GWT -srcfolder dmg_temp -ov -format UDZO dist/gwt-macos-universal.dmg
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: gwt-macos-universal.dmg
          path: dist/gwt-macos-universal.dmg

  upload-release:
    name: Upload to GitHub Release
    needs: [create-tag, build-gwt, build-msi, build-dmg]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Display artifacts
        run: find artifacts -type f | head -20
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-tag.outputs.tag_name }}
          files: artifacts/**/*
      - name: Publish release (remove draft status)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ needs.create-tag.outputs.tag_name }}" --draft=false

  publish-npm:
    name: Publish to npm
    needs: [create-tag, upload-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
