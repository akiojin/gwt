# Clippy configuration
cognitive-complexity-threshold = 25

# Issue #3293 / SPEC #1328 / SPEC #1942: gwt's GUI runs with
# `windows_subsystem = "windows"`, so any console subprocess spawned without
# CREATE_NO_WINDOW flashes a console window on Windows. This suppression was
# implemented twice and lost twice to refactors; this gate makes the third
# loss a CI error. Spawn through `gwt_core::process::resolved_command` (std)
# or `resolved_tokio_command` (tokio) so window hiding and executable safety
# share one process plan. Canonical adapter internals and intentional
# exceptions (build scripts, macOS-only paths, PTY) carry an explicit
# `#[allow(clippy::disallowed_methods)]` with a reason.
disallowed-methods = [
    { path = "std::process::Command::new", reason = "bypasses Windows window hiding and safe executable resolution; use gwt_core::process::resolved_command (Issues #3290, #3293)" },
    { path = "tokio::process::Command::new", reason = "bypasses Windows window hiding and safe executable resolution; use gwt_core::process::resolved_tokio_command (Issues #3290, #3293)" },
]
